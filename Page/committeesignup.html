<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Committee Sign Up | MyFKClub</title>
  <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
  <div class="page-shell">
    <main class="login-stage">
      <div class="login-card">
        <div class="login-card-header">
          <img class="header-logo" src="../Image/fkclub.jpg" alt="FKClub logo">
          <h1>MyFKClub</h1>
        </div>

        <div class="signup-heading">
          <h2>Committee First-Time Registration</h2>
          <p>Verify your committee details to begin username registration</p>
        </div>

        <form class="login-form" action="#" method="post">
          <label class="form-group">
            <span>Committee ID</span>
            <input type="text" name="committeeId" placeholder="Committee ID" required>
          </label>

          <label class="form-group">
            <span>Committee Name</span>
            <input type="text" name="committeeName" placeholder="Committee Name" required>
          </label>

          <label class="form-group">
            <span>Committee Email</span>
            <input type="email" name="committeeEmail" placeholder="Committee Email" required>
          </label>

          <label class="form-group">
            <span>Password</span>
            <input type="password" name="password" placeholder="Password" required>
          </label>

          <label class="form-group">
            <span>Confirm Password</span>
            <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
          </label>

          <button type="submit" class="primary-button">Confirm Committee Details</button>
          <a href="login.html" class="text-link">← Back</a>
        </form></div>
      </div>
    </main>
  </div>
</body>
</html>
